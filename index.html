<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabuada</title> 
</head>
<body>
    <h1 class="titulo-tabuada">Tabuada</h1>
    <input type="number" id="número">
    <button class="gerar" onclick="gerar()">Gerar</button>
    <ul id="lista">

    </ul>

    <script>
        
        function gerar(){
            let num = document.getElementById("numero").value;
            let lista = document.getElementById("lista");
            lista.innerHTML = "";

        for(let i=1; i<=10; i++){
            let item = document.createElement("li");
            item.innerText = num + "X" + i + "=" + (num * i);
            lista.appendChild(item);

        }
    }
    </script>

</body>
</html>
